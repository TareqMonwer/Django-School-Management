# Prometheus config for performance-test stack.
# Scrapes Locust exporter and optionally Django app metrics.

global:
  scrape_interval: 5s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "locust"
    static_configs:
      - targets: ["locust-exporter:9646"]
    metrics_path: /metrics

  - job_name: "django-perf"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "web:8000"
